# =============================================================================
# EVENT CATALOG — Single Source of Truth
# All domain events across all 9 domains of AlharisTech Platform
# Version: 1.0 | Generated from domain specs | Do not edit manually
# =============================================================================

events:
  # ===========================================================================
  # IDENTITY DOMAIN (8 events)
  # ===========================================================================
  - name: "UserRegistered"
    domain: "identity"
    trigger: "New user signs up via POST /api/v1/auth/register"
    publisher: "identity::AuthService"
    payload:
      userId: "UUID"
      email: "string"
      role: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "customer"
        handler: "CreateCustomerProfile"
        action: "Creates customer profile for new user"
      - domain: "notification"
        handler: "SendWelcomeEmail"
        action: "Sends welcome email to new user"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "UserVerified"
    domain: "identity"
    trigger: "Email verified via POST /api/v1/auth/verify-email"
    publisher: "identity::AuthService"
    payload:
      userId: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "customer"
        handler: "ActivateCustomerProfile"
        action: "Activates customer profile for verified user"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "UserLoggedIn"
    domain: "identity"
    trigger: "Successful login via POST /api/v1/auth/login"
    publisher: "identity::AuthService"
    payload:
      userId: "UUID"
      ip: "string"
      device: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "analytics"
        handler: "TrackLoginMetrics"
        action: "Records login event for analytics"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "UserLoggedOut"
    domain: "identity"
    trigger: "Logout via POST /api/v1/auth/logout"
    publisher: "identity::AuthService"
    payload:
      userId: "UUID"
      sessionId: "UUID"
      timestamp: "ISO8601"
    consumers: []
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "PasswordChanged"
    domain: "identity"
    trigger: "Password reset or change via POST /api/v1/auth/reset-password"
    publisher: "identity::AuthService"
    payload:
      userId: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendPasswordChangeConfirmation"
        action: "Sends password change confirmation email"
      - domain: "identity"
        handler: "RevokeOtherSessions"
        action: "Revokes all refresh tokens except current session"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "RoleChanged"
    domain: "identity"
    trigger: "Admin changes user role via PATCH /api/v1/users/{id}/role"
    publisher: "identity::UserService"
    payload:
      userId: "UUID"
      oldRole: "string"
      newRole: "string"
      changedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "identity"
        handler: "RevokeAllSessions"
        action: "Revokes all user sessions forcing re-login"
      - domain: "analytics"
        handler: "AuditRoleChange"
        action: "Logs role change for audit trail"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "AccountLocked"
    domain: "identity"
    trigger: "Too many failed login attempts (>= 5)"
    publisher: "identity::AuthService"
    payload:
      userId: "UUID"
      reason: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendSecurityAlert"
        action: "Sends security alert email to user"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "AccountDisabled"
    domain: "identity"
    trigger: "Admin disables account via POST /api/v1/users/{id}/disable"
    publisher: "identity::UserService"
    payload:
      userId: "UUID"
      disabledBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "identity"
        handler: "RevokeAllSessions"
        action: "Revokes all active sessions for disabled account"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  # ===========================================================================
  # CUSTOMER DOMAIN (8 events)
  # ===========================================================================
  - name: "CustomerCreated"
    domain: "customer"
    trigger: "New customer record inserted via POST /api/v1/customers"
    publisher: "customer::CustomerService"
    payload:
      customerId: "UUID"
      email: "string"
      type: "string"
      source: "string"
      createdBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "analytics"
        handler: "TrackCustomerMetrics"
        action: "Updates customer acquisition metrics"
      - domain: "notification"
        handler: "SendCustomerWelcome"
        action: "Sends welcome email to customer (if email provided)"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CustomerUpdated"
    domain: "customer"
    trigger: "Customer record modified via PATCH /api/v1/customers/{id}"
    publisher: "customer::CustomerService"
    payload:
      customerId: "UUID"
      changedFields: ["string"]
      updatedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "analytics"
        handler: "TrackProfileUpdates"
        action: "Records profile update metrics"
      - domain: "identity"
        handler: "SyncLinkedUser"
        action: "Syncs customer data with linked user account"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CustomerMerged"
    domain: "customer"
    trigger: "Two customers merged via POST /api/v1/customers/merge"
    publisher: "customer::CustomerService"
    payload:
      survivorId: "UUID"
      absorbedId: "UUID"
      mergedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "service"
        handler: "ReassignOrders"
        action: "Reassigns orders from absorbed to survivor customer"
      - domain: "support"
        handler: "ReassignTickets"
        action: "Reassigns tickets from absorbed to survivor customer"
      - domain: "commerce"
        handler: "ReassignCommerceOrders"
        action: "Reassigns commerce orders and invoices to survivor"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CommunicationLogged"
    domain: "customer"
    trigger: "New communication record created via POST /api/v1/customers/{id}/communications"
    publisher: "customer::CommunicationService"
    payload:
      logId: "UUID"
      customerId: "UUID"
      channel: "string"
      direction: "string"
      initiatedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "analytics"
        handler: "TrackCommunicationMetrics"
        action: "Records communication activity metrics"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CustomerTagged"
    domain: "customer"
    trigger: "Tags modified on customer via PATCH /api/v1/customers/{id}/tags"
    publisher: "customer::CustomerService"
    payload:
      customerId: "UUID"
      addedTags: ["string"]
      removedTags: ["string"]
      updatedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "analytics"
        handler: "UpdateSegmentMetrics"
        action: "Updates customer segment analytics"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CustomerImported"
    domain: "customer"
    trigger: "Batch CSV import completed via POST /api/v1/customers/import"
    publisher: "customer::ImportService"
    payload:
      importId: "UUID"
      totalRows: "integer"
      successCount: "integer"
      failedCount: "integer"
      initiatedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendImportSummary"
        action: "Sends import summary notification to admin"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CustomerExported"
    domain: "customer"
    trigger: "CSV export initiated via POST /api/v1/customers/export"
    publisher: "customer::ExportService"
    payload:
      exportId: "UUID"
      filterCriteria: "object"
      totalExported: "integer"
      initiatedBy: "UUID"
      timestamp: "ISO8601"
    consumers: []
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CustomerSoftDeleted"
    domain: "customer"
    trigger: "Customer soft-deleted via DELETE /api/v1/customers/{id}"
    publisher: "customer::CustomerService"
    payload:
      customerId: "UUID"
      deletedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "identity"
        handler: "DisableLinkedUser"
        action: "Disables linked user account"
      - domain: "service"
        handler: "CancelPendingOrders"
        action: "Cancels all pending orders for deleted customer"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  # ===========================================================================
  # SERVICE DOMAIN (9 events)
  # ===========================================================================
  - name: "OrderPlaced"
    domain: "service"
    trigger: "New service order submitted via POST /api/v1/orders"
    publisher: "service::OrderService"
    payload:
      orderId: "UUID"
      customerId: "UUID"
      serviceId: "UUID"
      referenceNumber: "string"
      totalAmount: "decimal"
      timestamp: "ISO8601"
    consumers:
      - domain: "commerce"
        handler: "CreateInvoice"
        action: "Creates billing invoice for the order"
      - domain: "notification"
        handler: "SendOrderConfirmation"
        action: "Sends order confirmation to customer"
      - domain: "customer"
        handler: "IncrementOrderCounter"
        action: "Increments total_orders counter on customer profile"
      - domain: "analytics"
        handler: "TrackOrderMetrics"
        action: "Records order creation for analytics"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "OrderStatusChanged"
    domain: "service"
    trigger: "Order status transitions via PATCH /api/v1/orders/{id}/status"
    publisher: "service::OrderService"
    payload:
      orderId: "UUID"
      oldStatus: "string"
      newStatus: "string"
      changedBy: "UUID"
      note: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendOrderStatusUpdate"
        action: "Sends status update notification to customer"
      - domain: "analytics"
        handler: "TrackWorkflowMetrics"
        action: "Records workflow transition metrics"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "OrderAssigned"
    domain: "service"
    trigger: "Employee assigned to order via POST /api/v1/orders/{id}/assign"
    publisher: "service::OrderService"
    payload:
      orderId: "UUID"
      employeeId: "UUID"
      assignedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "NotifyAssignedEmployee"
        action: "Notifies the assigned employee about new order"
      - domain: "analytics"
        handler: "TrackWorkload"
        action: "Updates employee workload metrics"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "OrderCompleted"
    domain: "service"
    trigger: "Order status reaches 'completed' via PATCH /api/v1/orders/{id}/status"
    publisher: "service::OrderService"
    payload:
      orderId: "UUID"
      customerId: "UUID"
      completedBy: "UUID"
      completedAt: "ISO8601"
      timestamp: "ISO8601"
    consumers:
      - domain: "commerce"
        handler: "FinalizeInvoice"
        action: "Finalizes billing invoice"
      - domain: "customer"
        handler: "UpdateOrderDenorm"
        action: "Updates last_order_at and total_spent on customer profile"
      - domain: "notification"
        handler: "RequestRating"
        action: "Sends service rating request to customer"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "OrderCancelled"
    domain: "service"
    trigger: "Order status reaches 'cancelled' via PATCH /api/v1/orders/{id}/status"
    publisher: "service::OrderService"
    payload:
      orderId: "UUID"
      reason: "string"
      cancelledBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "commerce"
        handler: "VoidInvoice"
        action: "Voids billing invoice for cancelled order"
      - domain: "notification"
        handler: "SendCancellationNotice"
        action: "Sends cancellation notice to customer"
      - domain: "analytics"
        handler: "TrackCancellationMetrics"
        action: "Records cancellation for analytics"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "OrderRejected"
    domain: "service"
    trigger: "Order status reaches 'rejected' via PATCH /api/v1/orders/{id}/status"
    publisher: "service::OrderService"
    payload:
      orderId: "UUID"
      reason: "string"
      rejectedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendRejectionNotice"
        action: "Sends rejection notice with reason to customer"
      - domain: "customer"
        handler: "NotifyCustomer"
        action: "Notifies customer of rejection"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "ServiceRated"
    domain: "service"
    trigger: "Customer rates completed order via POST /api/v1/orders/{id}/rate"
    publisher: "service::OrderService"
    payload:
      orderId: "UUID"
      serviceId: "UUID"
      customerId: "UUID"
      rating: "integer"
      comment: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "analytics"
        handler: "AggregateServiceRatings"
        action: "Aggregates service rating metrics"
      - domain: "service"
        handler: "UpdateAvgRating"
        action: "Updates denormalized average rating on service"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "DocumentsUploaded"
    domain: "service"
    trigger: "Customer uploads documents via POST /api/v1/orders/{id}/documents"
    publisher: "service::DocumentService"
    payload:
      orderId: "UUID"
      documentCount: "integer"
      timestamp: "ISO8601"
    consumers: []
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "DocumentsVerified"
    domain: "service"
    trigger: "Employee verifies uploaded documents"
    publisher: "service::DocumentService"
    payload:
      orderId: "UUID"
      verifiedDocumentIds: ["UUID"]
      verifiedBy: "UUID"
      timestamp: "ISO8601"
    consumers: []
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  # ===========================================================================
  # COMMERCE DOMAIN (20 events)
  # ===========================================================================
  - name: "ProductCreated"
    domain: "commerce"
    trigger: "New product added to catalog via POST /api/v1/products"
    publisher: "commerce::ProductService"
    payload:
      productId: "UUID"
      sku: "string"
      name_en: "string"
      categoryId: "UUID"
      createdBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "ai"
        handler: "IndexProductForSearch"
        action: "Indexes product for semantic search"
      - domain: "notification"
        handler: "NotifyFeaturedProduct"
        action: "Notifies subscribers if product is featured"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "ProductUpdated"
    domain: "commerce"
    trigger: "Product details modified via PATCH /api/v1/products/{id}"
    publisher: "commerce::ProductService"
    payload:
      productId: "UUID"
      changedFields: ["string"]
      updatedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "ai"
        handler: "ReindexProduct"
        action: "Reindexes product in search index"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "ProductPriceChanged"
    domain: "commerce"
    trigger: "Product price modified via PATCH /api/v1/products/{id}"
    publisher: "commerce::ProductService"
    payload:
      productId: "UUID"
      sku: "string"
      oldPrice: "decimal"
      newPrice: "decimal"
      changedBy: "UUID"
      reason: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "commerce"
        handler: "RecordPriceHistory"
        action: "Creates PriceHistory record"
      - domain: "notification"
        handler: "NotifyWishlistCustomers"
        action: "Notifies customers with product in wishlist"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "ProductDeleted"
    domain: "commerce"
    trigger: "Product soft-deleted via DELETE /api/v1/products/{id}"
    publisher: "commerce::ProductService"
    payload:
      productId: "UUID"
      sku: "string"
      deletedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "ai"
        handler: "RemoveFromSearchIndex"
        action: "Removes product from search index"
      - domain: "commerce"
        handler: "AlertCartOwners"
        action: "Alerts users with product in cart"
      - domain: "commerce"
        handler: "ReleaseInventory"
        action: "Releases all reserved inventory for deleted product"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "ProductActivated"
    domain: "commerce"
    trigger: "Product activated or deactivated via PATCH"
    publisher: "commerce::ProductService"
    payload:
      productId: "UUID"
      isActive: "boolean"
      changedBy: "UUID"
      timestamp: "ISO8601"
    consumers:
      - domain: "ai"
        handler: "UpdateSearchIndex"
        action: "Adds or removes product from search index"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "ItemAddedToCart"
    domain: "commerce"
    trigger: "Customer adds item to cart via POST /api/v1/cart/items"
    publisher: "commerce::CartService"
    payload:
      cartId: "UUID"
      customerId: "UUID"
      productId: "UUID"
      quantity: "integer"
      unitPrice: "decimal"
      timestamp: "ISO8601"
    consumers: []
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "ItemRemovedFromCart"
    domain: "commerce"
    trigger: "Customer removes item from cart via DELETE /api/v1/cart/items/{cartItemId}"
    publisher: "commerce::CartService"
    payload:
      cartId: "UUID"
      customerId: "UUID"
      productId: "UUID"
      timestamp: "ISO8601"
    consumers: []
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CartAbandoned"
    domain: "commerce"
    trigger: "Cart expires without conversion"
    publisher: "commerce::CartService"
    payload:
      cartId: "UUID"
      customerId: "UUID"
      items: ["object"]
      cartTotal: "decimal"
      timestamp: "ISO8601"
    consumers:
      - domain: "analytics"
        handler: "TrackCartAbandonment"
        action: "Records cart abandonment metrics for analytics"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CommerceOrderPlaced"
    domain: "commerce"
    trigger: "Customer completes checkout via POST /api/v1/commerce/orders"
    publisher: "commerce::OrderService"
    payload:
      orderId: "UUID"
      orderNumber: "string"
      customerId: "UUID"
      items: ["object"]
      total: "decimal"
      currency: "string"
      shippingAddress: "object"
      paymentMethod: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "commerce"
        handler: "CreateInvoice"
        action: "Creates billing invoice for commerce order"
      - domain: "notification"
        handler: "SendOrderConfirmation"
        action: "Sends order confirmation to customer"
      - domain: "commerce"
        handler: "ReserveInventory"
        action: "Reserves inventory for ordered items"
      - domain: "commerce"
        handler: "ConvertCart"
        action: "Converts cart to completed order"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "CommerceOrderStatusChanged"
    domain: "commerce"
    trigger: "Commerce order status transitions via PATCH /api/v1/commerce/orders/{id}/status"
    publisher: "commerce::OrderService"
    payload:
      orderId: "UUID"
      orderNumber: "string"
      oldStatus: "string"
      newStatus: "string"
      changedBy: "UUID"
      note: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendCommerceStatusUpdate"
        action: "Sends status update notification to customer"
      - domain: "commerce"
        handler: "TriggerShipping"
        action: "Triggers shipping if status is shipped"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "PaymentCompleted"
    domain: "commerce"
    trigger: "Payment successfully processed"
    publisher: "commerce::PaymentService"
    payload:
      orderId: "UUID"
      orderNumber: "string"
      amount: "decimal"
      currency: "string"
      paymentMethod: "string"
      paymentId: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "commerce"
        handler: "UpdatePaymentStatus"
        action: "Updates commerce order payment_status to paid"
      - domain: "notification"
        handler: "SendPaymentReceipt"
        action: "Sends payment receipt notification to customer"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "PaymentFailed"
    domain: "commerce"
    trigger: "Payment attempt failed"
    publisher: "commerce::PaymentService"
    payload:
      orderId: "UUID"
      orderNumber: "string"
      reason: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendPaymentFailureAlert"
        action: "Sends payment failure notification to customer"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "InventoryReserved"
    domain: "commerce"
    trigger: "Inventory reserved on order placed"
    publisher: "commerce::InventoryService"
    payload:
      inventoryId: "UUID"
      productId: "UUID"
      sku: "string"
      quantityReserved: "integer"
      remainingAvailable: "integer"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "LowStockCheck"
        action: "Checks if low stock notification needed"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "InventoryReleased"
    domain: "commerce"
    trigger: "Reservation released on order cancellation"
    publisher: "commerce::InventoryService"
    payload:
      inventoryId: "UUID"
      productId: "UUID"
      sku: "string"
      quantityReleased: "integer"
      timestamp: "ISO8601"
    consumers: []
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "InventoryDepleted"
    domain: "commerce"
    trigger: "Available quantity reaches 0"
    publisher: "commerce::InventoryService"
    payload:
      inventoryId: "UUID"
      productId: "UUID"
      sku: "string"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendAdminRestockAlert"
        action: "Sends admin alert for reorder"
      - domain: "commerce"
        handler: "AutoDeactivateProduct"
        action: "Optionally auto-deactivates product"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "InventoryLowStock"
    domain: "commerce"
    trigger: "Available inventory drops below threshold"
    publisher: "commerce::InventoryService"
    payload:
      inventoryId: "UUID"
      productId: "UUID"
      sku: "string"
      availableQuantity: "integer"
      threshold: "integer"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
        handler: "SendRestockReminder"
        action: "Sends admin restock reminder"
    delivery: "async"
    transport: "bullmq"
    schema_version: "1.0"

  - name: "ShipmentCreated"
    domain: "commerce"
    trigger: "Order shipped with tracking assigned"
    publisher: "commerce::ShippingService"
    payload:
      orderId: "UUID"
      orderNumber: "string"
      trackingNumber: "string"
      carrier: "string"
      estimatedDelivery: "date"
      items: ["object"]
      shippingAddress: "object"
      timestamp: "ISO8601"
    consumers:
      - domain: "notification"
