    resources: ["ai:ai_agent_invoke"]
    actions: ["execute"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [customer]
    resources: ["ai:ai_agent_invoke"]
    actions: ["execute"]
    conditions:
      - field: "agentType"
        operator: "equals"
        value: "support"
    priority: 50

  - effect: allow
    roles: [admin, manager, employee, customer]
    resources: ["ai:ai_chat"]
    actions: ["send"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [partner]
    resources: ["ai:ai_chat"]
    actions: ["send"]
    conditions:
      - field: "authMethod"
        operator: "equals"
        value: "api_key"
    priority: 40

  - effect: allow
    roles: [admin, manager]
    resources: ["ai:ai_knowledge"]
    actions: ["create", "read", "update", "delete", "ingest"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [employee]
    resources: ["ai:ai_knowledge"]
    actions: ["read"]
    conditions: []
    priority: 70

  - effect: allow
    roles: [admin, manager]
    resources: ["ai:ai_prompts"]
    actions: ["create", "read", "update"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [admin]
    resources: ["ai:ai_prompts"]
    actions: ["delete"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [admin, manager]
    resources: ["ai:ai_prompt_activate"]
    actions: ["update"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [employee]
    resources: ["ai:ai_prompts"]
    actions: ["read"]
    conditions: []
    priority: 70

  - effect: allow
    roles: [admin, manager]
    resources: ["ai:ai_interactions"]
    actions: ["read"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [admin, manager]
    resources: ["ai:ai_interaction_stats"]
    actions: ["read"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [employee]
    resources: ["ai:ai_agents"]
    actions: ["read"]
    conditions:
      - field: "isActive"
        operator: "equals"
        value: true
    priority: 70

  - effect: allow
    roles: [employee]
    resources: ["ai:ai_agent_invoke"]
    actions: ["execute"]
    conditions:
      - field: "agentType"
        operator: "in"
        value: ["support", "analytics"]
    priority: 70

  - effect: allow
    roles: [employee, customer]
    resources: ["ai:ai_interactions"]
    actions: ["read"]
    conditions:
      - field: "userId"
        operator: "equals"
        value: "$caller.id"
    priority: 50

  - effect: allow
    roles: [partner]
    resources: ["ai:ai_interactions"]
    actions: ["read"]
    conditions:
      - field: "userId"
        operator: "equals"
        value: "$caller.id"
    priority: 40

  # ===========================================================================
  # PUBLIC (unauthenticated) RESOURCES
  # ===========================================================================

  - effect: allow
    roles: ["*"]
    resources: ["service:services"]
    actions: ["read"]
    conditions:
      - field: "isActive"
        operator: "equals"
        value: true
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["service:service_categories"]
    actions: ["read"]
    conditions: []
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["commerce:products"]
    actions: ["read"]
    conditions:
