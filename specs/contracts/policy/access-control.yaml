# =============================================================================
# ACCESS CONTROL POLICY ENGINE SPEC
# Machine-readable RBAC policy specification derived from permission-matrix.yaml
# Priority-based evaluation: higher number = higher priority
# Default deny at priority 0, all explicit allows above
# Version: 1.0
# =============================================================================

# Policy evaluation model:
#   1. Collect all policies matching (role in roles) OR (roles contains "*")
#   2. If any matching policy has effect: deny → deny immediately
#   3. If any matching policy has effect: allow → allow (highest priority wins)
#   4. Fall through to default-deny (priority 0)

policies:

  # ===========================================================================
  # IDENTITY DOMAIN POLICIES
  # ===========================================================================

  - effect: allow
    roles: [admin, manager]
    resources: ["identity:users"]
    actions: ["create", "read", "update", "delete"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [admin]
    resources: ["identity:roles"]
    actions: ["create", "read", "update", "delete"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [manager]
    resources: ["identity:roles"]
    actions: ["read"]
    conditions: []
    priority: 80

  - effect: allow
    roles: [admin, manager]
    resources: ["identity:sessions"]
    actions: ["read", "revoke"]
    conditions: []
    priority: 100

  - effect: allow
    roles: [admin, manager, employee, customer, partner]
    resources: ["identity:auth_tokens"]
    actions: ["issue", "refresh", "revoke"]
    conditions: []
    priority: 60

  - effect: allow
    roles: [employee, customer, partner]
    resources: ["identity:users"]
    actions: ["read"]
    conditions:
      - field: "id"
        operator: "equals"
        value: "$caller.id"
    priority: 50

  - effect: allow
    roles: [employee, customer, partner]
    resources: ["identity:sessions"]
    actions: ["read"]
    conditions:
      - field: "userId"
        operator: "equals"
        value: "$caller.id"
    priority: 50

  # Employee role has empty actions on roles → no explicit policy needed (falls to deny)

