        operator: "equals"
        value: true
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["commerce:product_categories"]
    actions: ["read"]
    conditions: []
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["commerce:product_reviews"]
    actions: ["read"]
    conditions:
