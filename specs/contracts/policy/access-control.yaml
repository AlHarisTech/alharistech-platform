    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["support:knowledge_articles"]
    actions: ["read"]
    conditions:
      - field: "isPublished"
        operator: "equals"
        value: true
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["content:pages"]
    actions: ["read"]
    conditions:
      - field: "isPublished"
        operator: "equals"
        value: true
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["content:blog_posts"]
    actions: ["read"]
    conditions:
      - field: "isPublished"
        operator: "equals"
        value: true
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["content:blog_categories"]
    actions: ["read"]
    conditions: []
    priority: 10

  - effect: allow
