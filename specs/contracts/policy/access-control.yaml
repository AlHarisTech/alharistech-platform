  # ===========================================================================
  # DEFAULT DENY — lowest priority, catches everything not explicitly allowed
  # ===========================================================================

  - effect: deny
    roles: ["*"]
    resources: ["*"]
    actions: ["*"]
    priority: 0

# ===========================================================================
# CONDITION OPERATORS REFERENCE
# ===========================================================================
# operator: equals       → value must match exactly
# operator: in           → value must be one of the array elements
# operator: contains     → array value must contain the given element
# operator: regex        → value must match the regex pattern
# operator: greater_than → numeric comparison
# operator: less_than    → numeric comparison
#
# VARIABLE REFERENCE
# $caller.id          → authenticated user UUID
# $caller.role        → authenticated user role
# $caller.customerId  → linked customer profile UUID (for customer role)
# $caller.ip          → request IP address
# $now                → current UTC timestamp

# ===========================================================================
# RESOURCE MAPPING (domain:resource → API paths)
# ===========================================================================
# identity:users              → /api/v1/users, /api/v1/users/{id}
