    resources: ["content:sitemap"]
    actions: ["read"]
    conditions: []
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["content:menus"]
    actions: ["read"]
    conditions: []
    priority: 10

  - effect: allow
    roles: ["*"]
    resources: ["identity:auth"]
    actions: ["register", "login", "verify_email", "refresh_token", "forgot_password", "reset_password"]
    conditions: []
    priority: 5

  - effect: allow
    roles: ["*"]
    resources: ["support:knowledge_articles"]
    actions: ["feedback"]
    conditions: []
