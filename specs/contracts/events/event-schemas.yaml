  identity.user.registered:
    domain: identity
    event: UserRegistered
    version: "1.0"
    schema:
      type: object
      required: [userId, email, role, timestamp]
      properties:
        userId:
          type: string
          format: uuid
          description: "معرف المستخدم الفريد"
        email:
          type: string
          format: email
          description: "البريد الإلكتروني للمستخدم"
        role:
          type: string
          enum: [admin, manager, employee, customer, partner]
          description: "الدور الوظيفي للمستخدم"
        timestamp:
          type: string
          format: date-time
          description: "وقت تسجيل الحدث بتوقيت UTC"
    transport:
      type: async
      channel: "bullmq:identity.events"
    retention: "30 days"

