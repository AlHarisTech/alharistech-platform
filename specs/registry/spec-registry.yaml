# Pipeline Stages:
#   draft        — Initial creation
#   clarified    — Ambiguities resolved
#   planned      — Implementation plan created
#   implemented  — Code complete
#   verified     — QA passed
#   released     — In production
#   superseded   — Replaced by newer spec

# Spec Types:
#   product_requirements — PRD, vision
#   system_requirements  — FRs, NFRs
#   architecture         — Architecture documents
#   domain_spec          — Domain-level specification
#   feature_spec         — Feature-level specification
#   api_spec             — API contract
#   adr                  — Architecture Decision Record
