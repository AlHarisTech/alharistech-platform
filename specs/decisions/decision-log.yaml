  - id: "DEC-ORM"
    adr: null
    title: "ORM Selection — Prisma vs Drizzle"
    status: "unresolved"
    priority: "P0"
    needed_by: "2026-07-01"
    options:
      - name: "Prisma"
        pros: ["Mature ecosystem", "Excellent DX", "Auto-generated types", "Studio GUI"]
        cons: ["Heavier runtime", "Less flexible queries", "Migration lock-in"]
      - name: "Drizzle"
        pros: ["Lightweight", "SQL-like DX", "Better performance", "Flexible"]
        cons: ["Smaller community", "Less tooling", "Newer"]
    affects:
      specs: ["SPEC-DOM-001", "SPEC-DOM-009"]
      domains: [all]
    recommendation: "Drizzle for performance and flexibility; Prisma if DX and tooling are prioritized"

  - id: "DEC-MOBILE"
    adr: null
    title: "Mobile Framework — React Native vs Flutter"
    status: "unresolved"
    priority: "P2"
    needed_by: "2027-06"
    options:
      - name: "React Native"
        pros: ["Shared TypeScript codebase", "Shared packages (auth, sdk)", "Web-like DX"]
        cons: ["Performance overhead", "Native module bridging"]
      - name: "Flutter"
        pros: ["Better performance", "Single codebase iOS+Android", "Rich widget library"]
        cons: ["Dart (separate language)", "No code sharing with web", "Larger app size"]
    affects:
      channels: ["android", "ios"]
    recommendation: "React Native for TypeScript/code sharing with monorepo"

