name: CI

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Bootstrap verification
        run: |
          echo "Starting API server..."
          node apps/api/dist/apps/api/src/main.js &
          SERVER_PID=$!

          echo "Waiting for server..."
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:4000/health > /dev/null 2>&1; then
              echo "Server is ready (attempt $i)"
              break
            fi
            sleep 1
          done

          echo "Checking health endpoint..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed: HTTP $HTTP_CODE"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          echo "Health check passed: HTTP 200"

          echo "Checking dashboard endpoint..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/events/dashboard)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Dashboard endpoint check failed: HTTP $HTTP_CODE"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          echo "Dashboard endpoint passed: HTTP 200"

          echo "Checking SchemaRegistry status..."
          HEALTH_BODY=$(curl -sf http://127.0.0.1:4000/events/health)
          echo "$HEALTH_BODY" | head -5

          kill $SERVER_PID 2>/dev/null || true
          echo "Bootstrap verification passed"

  e2e:
    name: E2E (Playwright)
    needs: integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alharistech
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Wait for Postgres
        run: |
          timeout 30 bash -c '
            until pg_isready -h localhost -p 5432 -U postgres; do
              echo "Waiting for Postgres..."
              sleep 1
            done
          ' || (echo "::error::Postgres not ready after 30s" && exit 1)
          echo "Postgres ready"

      - name: Wait for Redis
        run: |
          timeout 30 bash -c '
            until redis-cli -h localhost ping 2>/dev/null || nc -z localhost 6379 2>/dev/null; do
              echo "Waiting for Redis..."
              sleep 1
            done
          ' || (echo "::error::Redis not ready after 30s" && exit 1)
          echo "Redis ready"

      - name: Start API
        run: |
          NODE_ENV=test \
          DB_HOST=localhost \
          DB_PORT=5432 \
          DB_USER=postgres \
          DB_PASSWORD=postgres \
          DB_NAME=alharistech \
          REDIS_HOST=localhost \
          REDIS_PORT=6379 \
          CONTRACT_RESPONSE_MODE=strict \
          node apps/api/dist/apps/api/src/main.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4000/health > /dev/null 2>&1; then
              echo "API ready (attempt $i)"
              break
            fi
            sleep 2
          done

      - name: Start Dashboard dev server
        run: |
          pnpm --filter @aht/dashboard dev &
          echo "VITE_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Dashboard
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:5173 > /dev/null 2>&1; then
              echo "Dashboard ready (attempt $i)"
              break
            fi
            sleep 1
          done

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            e2e-report/
            test-results/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          kill $(echo "${{ env.VITE_PID }}") 2>/dev/null || true
          kill $(echo "${{ env.API_PID }}") 2>/dev/null || true

  runtime-e2e:
    name: Runtime E2E (Scenario Tests)
    if: github.event_name == 'workflow_dispatch'
    needs: integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alharistech
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Wait for Postgres
        run: |
          timeout 30 bash -c '
            until pg_isready -h localhost -p 5432 -U postgres; do
              echo "Waiting for Postgres..."
              sleep 1
            done
          ' || (echo "::error::Postgres not ready after 30s" && exit 1)
          echo "Postgres ready"

      - name: Wait for Redis
        run: |
          timeout 30 bash -c '
            until redis-cli -h localhost ping 2>/dev/null || nc -z localhost 6379 2>/dev/null; do
              echo "Waiting for Redis..."
              sleep 1
            done
          ' || (echo "::error::Redis not ready after 30s" && exit 1)
          echo "Redis ready"

      - name: Start API
        run: |
          NODE_ENV=test \
          DB_HOST=localhost \
          DB_PORT=5432 \
          DB_USER=postgres \
          DB_PASSWORD=postgres \
          DB_NAME=alharistech \
          REDIS_HOST=localhost \
          REDIS_PORT=6379 \
          CONTRACT_RESPONSE_MODE=strict \
          node apps/api/dist/apps/api/src/main.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4000/health > /dev/null 2>&1; then
              echo "API ready (attempt $i)"
              break
            fi
            sleep 2
          done

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run Runtime E2E tests
        run: |
          RUNTIME_TEST_MODE=true \
          pnpm test:runtime-e2e

      - name: Upload Runtime E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-e2e-report
          path: |
            e2e-report/
            test-results/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: kill $(echo "${{ env.API_PID }}") 2>/dev/null || true

  integration:
    name: Integration Runtime (Postgres + Redis)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alharistech
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Wait for Postgres
        run: |
          timeout 30 bash -c '
            until pg_isready -h localhost -p 5432 -U postgres; do
              echo "Waiting for Postgres..."
              sleep 1
            done
          ' || (echo "::error::Postgres not ready after 30s" && exit 1)
          echo "Postgres ready"

      - name: Wait for Redis
        run: |
          timeout 30 bash -c '
            until redis-cli -h localhost ping 2>/dev/null || nc -z localhost 6379 2>/dev/null; do
              echo "Waiting for Redis..."
              sleep 1
            done
          ' || (echo "::error::Redis not ready after 30s" && exit 1)
          echo "Redis ready"

      - name: Start API
        run: |
          NODE_ENV=test \
          DB_HOST=localhost \
          DB_PORT=5432 \
          DB_USER=postgres \
          DB_PASSWORD=postgres \
          DB_NAME=alharistech \
          REDIS_HOST=localhost \
          REDIS_PORT=6379 \
          CONTRACT_RESPONSE_MODE=strict \
          node apps/api/dist/apps/api/src/main.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4000/health > /dev/null 2>&1; then
              echo "API ready (attempt $i)"
              break
            fi
            sleep 2
          done

      - name: Health endpoint
        run: |
          BODY=$(curl -sf http://127.0.0.1:4000/health)
          echo "$BODY"
          echo "$BODY" | python3 -c 'import sys,json; d=json.load(sys.stdin); assert d.get("status")=="ok","status:"+str(d.get("status")); er=d.get("eventRuntime",{}); assert er.get("status")=="healthy","er.status:"+str(er.get("status")); assert er.get("redis")=="connected","er.redis:"+str(er.get("redis")); print("OI-010: eventRuntime status=healthy"); print("OI-011: eventRuntime redis=connected")'

      - name: Dashboard endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/events/dashboard)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Integration dashboard check failed: HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Dashboard endpoint: HTTP 200 ✓"

      - name: Metrics endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/events/metrics)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Integration metrics check failed: HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Metrics endpoint: HTTP 200 ✓"

      - name: Trace endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/events/trace)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Integration trace check failed: HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Trace endpoint: HTTP 200 ✓"

      - name: Events health (Runtime system status)
        run: |
          BODY=$(curl -sf http://127.0.0.1:4000/events/health)
          echo "$BODY"
          echo "$BODY" | python3 -c 'import sys,json; d=json.load(sys.stdin); assert d.get("status")=="healthy","s:"+str(d.get("status")); assert d.get("redis",{}).get("status")=="connected","redis:"+str(d.get("redis")); assert d.get("workers",{}).get("status")=="running","workers:"+str(d.get("workers")); assert d.get("idempotency",{}).get("status")=="available","idem:"+str(d.get("idempotency")); print("OI-013: runtime status=healthy, redis=connected, workers=running, idempotency=available")'

      - name: Cleanup
        if: always()
        run: kill $(echo "${{ env.API_PID }}") 2>/dev/null || true
