quality_gates:
  - id: "G0"
    name: "Vision Gate"
    criteria: ["vision_document_approved"]

  - id: "G1"
    name: "Requirements Gate"
    criteria: ["prd_approved", "system_requirements_approved"]

  - id: "G2"
    name: "Architecture Gate"
    criteria: ["architecture_approved", "all_adrs_complete", "c4_diagrams_complete"]

  - id: "G3"
    name: "Design Gate"
    criteria: ["domain_specs_complete", "api_spec_complete", "data_model_complete"]

  - id: "G4"
    name: "Implementation Gate"
    criteria: ["code_complete", "unit_tests_pass", "integration_tests_pass"]

  - id: "G5"
    name: "Validation Gate"
    criteria: ["e2e_tests_pass", "security_audit_pass", "performance_benchmark_pass"]

  - id: "G6"
    name: "Release Gate"
    criteria: ["deployed_to_production", "monitoring_active", "rollback_plan_ready"]

  - id: "G7"
    name: "Operations Gate"
    criteria: ["kpis_met", "incidents_resolved", "feedback_collected"]

tools:
  ai_workstation_core:
