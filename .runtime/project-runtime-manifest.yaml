  - id: "admin"
    name: "Admin Dashboard"
    technology: "Next.js"
    phase: "phase-2"

  - id: "desktop"
    name: "Desktop Application"
    technology: "Tauri/Electron"
    phase: "phase-4"

  - id: "android"
    name: "Android Application"
    technology: "React Native"
    phase: "phase-4"

  - id: "ios"
