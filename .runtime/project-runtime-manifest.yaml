  name: "AlharisTech Platform"
  name_ar: "منصة الحارس تك"
  type: "digital-business-operating-system"
  repository: "/home/asem/workspace/projects/Alharistech"

lifecycle:
  current_phase: "sprint-0"
  current_gate: "G2" # Architecture gate
  phases:
    - id: "sprint-0"
      name: "Architecture Foundation"
      status: "in-progress"
      progress: 0.52
      gates: ["G0", "G1", "G2"]
      deliverables:
        - "Vision & Strategy"
        - "PRD & Requirements"
        - "Architecture & ADRs"
        - "C4 & Diagrams"
        - "Governance & Tooling"
        - "Development Environment"

    - id: "phase-1"
      name: "Digital Presence — Official Website"
      status: "pending"
      depends_on: ["sprint-0"]
      gates: ["G3", "G4", "G5", "G6"]
      estimated_duration: "4 months"
      deliverables:
        - "Monorepo Setup"
        - "Authentication System"
        - "Public Website"
        - "CMS"
        - "Services & Orders System"

    - id: "phase-2"
      name: "Internal Management"
      status: "pending"
      depends_on: ["phase-1"]
      estimated_duration: "6 months"

    - id: "phase-3"
      name: "E-Commerce"
      status: "pending"
      depends_on: ["phase-2"]
      estimated_duration: "6 months"

    - id: "phase-4"
      name: "Desktop & Mobile"
      status: "pending"
      depends_on: ["phase-3"]
      estimated_duration: "8 months"

    - id: "phase-5"
      name: "SaaS, Marketplace & AI"
      status: "pending"
      depends_on: ["phase-4"]
      estimated_duration: "12 months"

principles:
  perp:
    - name: "Security First"
      id: "PERP-SEC"
      enforcement: "security-review-gate"
    - name: "Scalability First"
      id: "PERP-SCA"
      enforcement: "load-test-gate"
    - name: "Maintainability First"
      id: "PERP-MNT"
      enforcement: "code-review + lint-gate"
    - name: "Minimal Complexity"
      id: "PERP-MIN"
      enforcement: "architecture-review"
    - name: "Evidence First"
      id: "PERP-EVI"
      enforcement: "decision-record-required"
    - name: "Modular First"
      id: "PERP-MOD"
      enforcement: "dependency-analysis"
    - name: "API First"
      id: "PERP-API"
      enforcement: "openapi-validation"
    - name: "Fail Closed"
      id: "PERP-FCL"
      enforcement: "security-audit"

domains:
  - id: "identity"
    name: "الهوية — Identity"
    bounded_context: "Authentication, Users, Roles, Permissions"
    phase: "phase-1"

  - id: "customer"
    name: "العملاء — Customer"
    bounded_context: "CRM, Profiles, Tags, Communication"
    phase: "phase-2"

  - id: "service"
    name: "الخدمات — Service"
    bounded_context: "Services Catalog, Orders, Workflow, Documents"
    phase: "phase-1"

  - id: "commerce"
    name: "التجارة — Commerce"
    bounded_context: "Products, Cart, Checkout, Inventory, Shipping"
    phase: "phase-3"

  - id: "support"
    name: "الدعم — Support"
    bounded_context: "Tickets, Knowledge Base, Live Chat"
    phase: "phase-2"

  - id: "content"
    name: "المحتوى — Content"
    bounded_context: "CMS, Pages, Blog, Media, SEO"
    phase: "phase-1"

  - id: "notification"
    name: "الإشعارات — Notification"
    bounded_context: "Email, SMS, Push, Templates"
    phase: "phase-2"

  - id: "analytics"
    name: "التحليلات — Analytics"
    bounded_context: "Reports, Dashboards, KPIs"
    phase: "phase-2"

  - id: "ai"
    name: "الذكاء الاصطناعي — AI"
    bounded_context: "Agents, RAG, Embeddings, Automation"
    phase: "phase-5"

channels:
  - id: "web"
    name: "Web Platform"
    technology: "Next.js"
